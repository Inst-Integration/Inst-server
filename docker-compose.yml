services:
  nginx:
    build:
      context: ../../ai/instAiPart
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped

  app:
    build:
      context: ../../ai/instAiPart
      dockerfile: Dockerfile.server
    expose:
      - "8080"
    env_file:
      - ../../ai/instAiPart/.env
    environment:
      - DB_HOST=db
      - DB_NAME=inst
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inst
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d inst"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: